name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Span the Node versions real Signal K servers run on, plus the 24 toolchain we develop with.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage

  # Check that every commit on a pull request follows Conventional Commits, so releasing stays
  # automatic even for contributors whose local git hooks didn't run.
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # Official Signal K plugin integration check: packs + installs the plugin into a real server and
  # verifies it loads and registers its providers. See docs/develop/plugins/ci.md.
  signalk-integration:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
