name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Span the Node versions real Signal K servers run on, plus the 24 toolchain we develop with.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm test

  # Official Signal K plugin integration check: packs + installs the plugin into a real server and
  # verifies it loads and registers its providers. See docs/develop/plugins/ci.md.
  signalk-integration:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
