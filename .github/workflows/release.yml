name: Release

on:
  push:
    branches: [main]

# OIDC trusted publishing to npm — no NPM_TOKEN. The id-token permission lets npm verify the
# build came from this repo + workflow. See CONTRIBUTING.md "Releases" for the one-time npm setup.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Dormant until releasing is switched on: set the repo variable RELEASE_ENABLED=true once the
    # npm trusted publisher is configured (see CONTRIBUTING.md). The chore(release) guard stops the
    # release commit semantic-release pushes from triggering another run ("[skip ci]" also guards).
    if: >-
      vars.RELEASE_ENABLED == 'true' &&
      !contains(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm CLI >= 11.5.1; setup-node ships an older npm with Node 24.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
